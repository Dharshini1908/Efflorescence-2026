<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Efflorescence 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- AOS Animation -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(to right, #0f172a, #1e293b);
      text-align: center;
    }

    h1 {
      font-size: 3rem;
    }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(45deg, #9333ea, #06b6d4);
      border: none;
      color: white;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    section {
      padding: 50px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
    }
  </style>
</head>

<body>

<header>
  <h1 data-aos="fade-up">EFFLORESCENCE 2026</h1>
  <p data-aos="fade-up" data-aos-delay="200">Where Innovation Meets Celebration</p>
  <button class="btn">Register Now</button>
</header>

<section>
  <h2 data-aos="fade-up">Technical Events</h2>
  <div class="cards">
    <div class="card" data-aos="zoom-in">Paper Presentation</div>
    <div class="card" data-aos="zoom-in">Coding Contest</div>
  </div>
</section>

<section>
  <h2 data-aos="fade-up">Non-Technical Events</h2>
  <div class="cards">
    <div class="card" data-aos="zoom-in">Treasure Hunt</div>
    <div class="card" data-aos="zoom-in">Gaming</div>
  </div>
</section>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init();
</script>

</body>
</html>
